<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 795 400" role="img" aria-label="R 기반 텍스트마이닝 — VibeStat-Text 개념도">
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#222228"/>
      <stop offset="55%" stop-color="#18181c"/>
      <stop offset="100%" stop-color="#121216"/>
    </linearGradient>
    <radialGradient id="rGlow" cx="50%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#276DC3" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#3b9eff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5aadff"/>
      <stop offset="45%" stop-color="#276DC3"/>
      <stop offset="100%" stop-color="#4ec9b0"/>
    </linearGradient>
    <linearGradient id="rFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2433"/>
      <stop offset="100%" stop-color="#0f1419"/>
    </linearGradient>
    <clipPath id="rInterior">
      <path d="M 318 78 L 318 322 L 358 322 L 358 218 Q 358 168 408 168 Q 458 168 458 208 Q 458 248 408 248 L 378 248 L 448 322 L 408 322 L 348 252 Q 488 242 488 198 Q 488 128 408 128 Q 358 128 358 78 Z"/>
    </clipPath>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- panel -->
  <rect width="795" height="400" rx="8" fill="url(#panelBg)"/>
  <rect width="795" height="400" rx="8" fill="url(#rGlow)"/>

  <!-- subtle grid -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="795" y2="80"/>
    <line x1="0" y1="160" x2="795" y2="160"/>
    <line x1="0" y1="240" x2="795" y2="240"/>
    <line x1="0" y1="320" x2="795" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- orbit rings (VibeStatics motif) -->
  <g opacity="0.35" fill="none" stroke="#3b9eff" stroke-width="0.8">
    <ellipse cx="398" cy="200" rx="168" ry="62" transform="rotate(-18 398 200)"/>
    <ellipse cx="398" cy="200" rx="148" ry="54" transform="rotate(24 398 200)"/>
  </g>
  <circle cx="398" cy="200" r="3" fill="#5aadff" opacity="0.6"/>

  <!-- R letter shell -->
  <path d="M 312 72 L 312 328 L 364 328 L 364 222 Q 364 162 418 162 Q 472 162 472 206 Q 472 254 418 254 L 384 254 L 458 328 L 504 328 L 424 248 Q 498 236 498 198 Q 498 122 418 122 Q 364 122 364 72 Z"
        fill="url(#rFill)" stroke="url(#rStroke)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- analysis inside R -->
  <g clip-path="url(#rInterior)">
    <!-- network -->
    <g opacity="0.85">
      <line x1="368" y1="108" x2="420" y2="132" stroke="#4ec9b0" stroke-width="1.2" opacity="0.7"/>
      <line x1="420" y1="132" x2="452" y2="118" stroke="#4ec9b0" stroke-width="1.2" opacity="0.7"/>
      <line x1="368" y1="108" x2="390" y2="148" stroke="#5aadff" stroke-width="1.2" opacity="0.6"/>
      <line x1="390" y1="148" x2="430" y2="168" stroke="#5aadff" stroke-width="1.2" opacity="0.6"/>
      <line x1="430" y1="168" x2="462" y2="152" stroke="#9ecfff" stroke-width="1.2" opacity="0.5"/>
      <circle cx="368" cy="108" r="5" fill="#4ec9b0"/>
      <circle cx="420" cy="132" r="4.5" fill="#5aadff"/>
      <circle cx="452" cy="118" r="4" fill="#9ecfff"/>
      <circle cx="390" cy="148" r="4" fill="#5aadff"/>
      <circle cx="430" cy="168" r="5" fill="#4ec9b0"/>
      <circle cx="462" cy="152" r="3.5" fill="#9ecfff"/>
    </g>

    <!-- word cloud -->
    <text x="345" y="205" fill="#5aadff" font-family="Segoe UI,sans-serif" font-size="22" font-weight="700" opacity="0.9">빈도</text>
    <text x="408" y="198" fill="#4ec9b0" font-family="Segoe UI,sans-serif" font-size="16" font-weight="600" opacity="0.85">토픽</text>
    <text x="438" y="218" fill="#9ecfff" font-family="Segoe UI,sans-serif" font-size="13" opacity="0.75">코퍼스</text>
    <text x="362" y="228" fill="#7eb8ff" font-family="Segoe UI,sans-serif" font-size="11" opacity="0.65">TF-IDF</text>
    <text x="418" y="232" fill="#6ecfb8" font-family="Segoe UI,sans-serif" font-size="10" opacity="0.6">연구</text>

    <!-- LDA bars -->
    <g opacity="0.8">
      <rect x="352" y="268" width="14" height="38" rx="2" fill="#276DC3" opacity="0.7"/>
      <rect x="372" y="258" width="14" height="48" rx="2" fill="#3b9eff" opacity="0.75"/>
      <rect x="392" y="248" width="14" height="58" rx="2" fill="#5aadff" opacity="0.8"/>
      <rect x="412" y="262" width="14" height="44" rx="2" fill="#4ec9b0" opacity="0.7"/>
      <rect x="432" y="272" width="14" height="34" rx="2" fill="#9ecfff" opacity="0.65"/>
      <text x="352" y="318" fill="#6a6a6a" font-family="Segoe UI,sans-serif" font-size="9">LDA</text>
    </g>
  </g>

  <!-- floating analysis labels -->
  <g font-family="Segoe UI,sans-serif">
    <rect x="548" y="88" width="118" height="28" rx="14" fill="rgba(59,158,255,0.1)" stroke="rgba(59,158,255,0.25)"/>
    <text x="607" y="107" text-anchor="middle" fill="#9ecfff" font-size="11" font-weight="600">워드클라우드</text>

    <rect x="572" y="168" width="92" height="28" rx="14" fill="rgba(78,201,176,0.08)" stroke="rgba(78,201,176,0.22)"/>
    <text x="618" y="187" text-anchor="middle" fill="#4ec9b0" font-size="11" font-weight="600">문서 비교</text>

    <rect x="556" y="248" width="108" height="28" rx="14" fill="rgba(158,207,255,0.08)" stroke="rgba(158,207,255,0.2)"/>
    <text x="610" y="267" text-anchor="middle" fill="#c8e4ff" font-size="11" font-weight="600">네트워크</text>
  </g>

  <!-- connector lines to R -->
  <g stroke="#3b9eff" stroke-width="0.8" opacity="0.25" stroke-dasharray="3 4">
    <line x1="502" y1="130" x2="548" y2="102"/>
    <line x1="498" y1="200" x2="572" y2="182"/>
    <line x1="492" y1="268" x2="556" y2="262"/>
  </g>

  <!-- top badge -->
  <rect x="24" y="18" width="88" height="22" rx="4" fill="#3b9eff" fill-opacity="0.12" stroke="#3b9eff" stroke-opacity="0.28"/>
  <text x="35" y="33" fill="#9ecfff" font-family="Segoe UI,sans-serif" font-size="11" font-weight="600">VibeStat-Text</text>
  <text x="122" y="33" fill="#6a6a6a" font-size="11">·</text>
  <text x="132" y="33" fill="#7a7a7a" font-family="Segoe UI,sans-serif" font-size="10">R 기반 · 버튼 분석</text>

  <!-- caption -->
  <text x="398" y="372" text-anchor="middle" fill="#6a6a6a" font-family="Segoe UI,sans-serif" font-size="11" letter-spacing="0.04em">BIG DATA · TEXT MINING · STATISTICS</text>
  <text x="398" y="390" text-anchor="middle" fill="#8a8a8a" font-family="Segoe UI,sans-serif" font-size="10">.txt · .csv · .xlsx · .pdf · .hwp → 한 번에</text>
</svg>
